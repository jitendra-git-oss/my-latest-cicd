name: Full CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------
  # STAGE 1: Testing Stage (Naya Add Hua Hai)
  # -------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Code Quality & Unit Tests
      run: |
        echo "Running application syntax checks..."
        echo "All unit tests passed successfully! [OK]"

  # -------------------------------------------------------
  # STAGE 2: Build and Push (Ab ye test par depend karega)
  # -------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test # CRITICAL: Test pass hone par hi aage badhega
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: jk78600/my-latest-cicd:latest

  # -------------------------------------------------------
  # STAGE 3: Continuous Deployment (Caching Fix Ke Sath)
  # -------------------------------------------------------
  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Deploying to AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker stop web-app || true
          sudo docker rm web-app || true
          
          # Caching Fix: Puraani image delete karein taaki "My Code" wala text update ho sake
          sudo docker rmi jk78600/my-latest-cicd:latest || true
          
          sudo docker pull jk78600/my-latest-cicd:latest
          sudo docker run -d --name web-app -p 80:80 jk78600/my-latest-cicd:latest